services:
  db:
    image: postgres:16-alpine
    container_name: cuisine-postgres
    restart: always
    environment:
      POSTGRES_USER: cuisine_user
      POSTGRES_PASSWORD: cuisine_password
      POSTGRES_DB: cuisine_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: