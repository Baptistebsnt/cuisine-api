spring.application.name=cuisine-api

spring.datasource.url=jdbc:postgresql://localhost:5432/cuisine_db
spring.datasource.username=cuisine_user
spring.datasource.password=cuisine_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Raccourci pratique pour accéder à l'interface Swagger
springdoc.swagger-ui.path=/swagger-ui.html