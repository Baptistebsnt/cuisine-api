openapi: 3.0.3
info:
  title: Cuisine Community API
  description: API pour une plateforme de cuisine sans pub et communautaire (MVP)
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Serveur local de développement

paths:
  /recipes:
    get:
      summary: Lister toutes les recettes
      operationId: getAllRecipes
      tags:
        - Recipe
      responses:
        '200':
          description: Liste des recettes récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeDTO'
    post:
      summary: Créer une nouvelle recette
      operationId: createRecipe
      tags:
        - Recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeDTO'
      responses:
        '201':
          description: Recette créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDTO'

components:
  schemas:
    RecipeDTO:
      type: object
      required:
        - title
        - ingredients
        - steps
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        title:
          type: string
          example: "Omelette aux fines herbes"
        description:
          type: string
          example: "Une recette simple et rapide pour le soir."
        cookingTimeMinutes:
          type: integer
          example: 10
        authorId:
          type: integer
          format: int64
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientDTO'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepDTO'

    IngredientDTO:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Oeufs"
        quantity:
          type: number
          format: double
          example: 3
        unit:
          type: string
          example: "pièces"

    StepDTO:
      type: object
      required:
        - stepOrder
        - instruction
      properties:
        stepOrder:
          type: integer
          example: 1
        instruction:
          type: string
          example: "Battre les oeufs dans un bol."